plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java { srcDirs = ['src'] }

        java { exclude 'test/**' }
    }
    test {
        java { srcDirs = ['src/test'] }
    }
}

dependencies {

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'Main'
}

tasks.named('test') {

    useJUnitPlatform()
}